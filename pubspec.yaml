name: cheffy
description: Cheffy — Your AI Personal Chef app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # ── AI / Networking ───────────────────────────────────────────────────────
  http: ^1.2.2

  # ── Maps & Location ───────────────────────────────────────────────────────
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  # ── Media ─────────────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  video_player: ^2.9.1
  youtube_explode_dart: ^2.3.1
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # ── Auth & Security ───────────────────────────────────────────────────────
  local_auth: ^2.3.0

  # ── Notifications ─────────────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ── Storage & Prefs ───────────────────────────────────────────────────────
  shared_preferences: ^2.3.3

  # ── Permissions ───────────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── UI / UX ───────────────────────────────────────────────────────────────
  fl_chart: ^0.69.0
  webview_flutter: ^4.10.0

  # ── Utilities ─────────────────────────────────────────────────────────────
  share_plus: ^10.1.2
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    # - assets/static_recipes.json